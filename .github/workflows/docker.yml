name: Build Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: wycbugaibot/qrcode-service:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test container
        run: |
          docker run -d --name qrcode-test -p 5001:5000 wycbugaibot/qrcode-service:latest
          sleep 5
          curl -f http://localhost:5001/health
          docker stop qrcode-test
          docker rm qrcode-test
